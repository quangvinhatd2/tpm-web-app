<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | Hệ thống Quản lý TPM HPCBANVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(rgba(0, 84, 166, 0.85), rgba(0, 40, 80, 0.9)), 
                        url('https://images.unsplash.com/photo-1473341304170-971dccb5ac1e?auto=format&fit=crop&q=80&w=2070');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: flex-start; 
            justify-content: center;
            margin: 0;
            padding-top: 5vh; /* giảm khoảng cách từ trên xuống */
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .evn-blue { color: #0054A6; }
        .bg-evn-orange { background-color: #F58220; }
        .bg-evn-orange:hover { background-color: #E67310; }
        
        .input-group input:focus {
            border-color: #0054A6;
            box-shadow: 0 0 0 3px rgba(0, 84, 166, 0.2);
            outline: none;
        }

        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-slide-in { animation: slideIn 0.4s ease-out; }

        /* Thu nhỏ các thành phần */
        .glass-card {
            padding: 1.5rem 2rem !important;
            border-radius: 2rem !important;
        }
        .glass-card h2 {
            font-size: 1.8rem !important;
            margin-bottom: 1.5rem !important;
        }
        .input-group label {
            font-size: 0.9rem !important;
            margin-bottom: 0.5rem !important;
        }
        .input-group input {
            padding: 0.75rem 1rem 0.75rem 2.5rem !important;
            font-size: 0.9rem !important;
            border-radius: 1rem !important;
        }
        .input-group .absolute {
            left: 0.75rem !important;
        }
        .input-group i {
            font-size: 1rem !important;
        }
        button {
            padding: 0.75rem !important;
            font-size: 1rem !important;
            border-radius: 1rem !important;
        }
        .top-icon {
            width: 4rem !important;
            height: 4rem !important;
            margin-bottom: 1rem !important;
        }
        .top-icon i {
            font-size: 2rem !important;
        }
        .title {
            font-size: 1.2rem !important;
            white-space: nowrap;
        }
        .support-text {
            font-size: 0.7rem !important;
            white-space: nowrap;
        }
        .copyright {
            font-size: 0.65rem !important;
        }
    </style>
</head>
<body class="bg-gray-100">

    <div class="w-full max-w-md px-6 animate-slide-in">  <!-- thu hẹp max-width -->
        
        <div class="text-center mb-6">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-blue-50 to-white rounded-2xl shadow-xl mb-4 transition-transform hover:scale-110 top-icon">
                <i class="fa-solid fa-bolt-lightning text-3xl bg-gradient-to-t from-blue-800 to-blue-500 bg-clip-text text-transparent drop-shadow-[0_2px_10px_rgba(59,130,246,0.5)]"></i>
            </div>
            <h1 class="text-white text-xl font-extrabold tracking-tight uppercase whitespace-nowrap title">
                Hệ thống Đánh giá bảo trì tự quản TPM
            </h1>
        </div>

        <div class="glass-card rounded-3xl p-6 overflow-hidden relative">
            <div class="absolute top-0 left-0 w-full h-2 bg-evn-orange"></div>

            <h2 class="text-3xl font-black text-gray-800 mb-6 text-center">Đăng nhập</h2>

            <form method="post" class="space-y-6">
                <div class="input-group">
                    <label class="block text-sm font-bold text-gray-600 mb-2 ml-1">Tên đăng nhập</label>
                    <div class="relative group">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400 group-focus-within:text-blue-600">
                            <i class="fa-solid fa-user text-base"></i>
                        </span>
                        <input type="text" name="username" required
                               class="w-full pl-8 pr-4 py-2 border border-gray-300 rounded-xl transition-all duration-200 bg-gray-50 focus:bg-white text-base"
                               placeholder="Nhập tài khoản kỹ sư...">
                    </div>
                </div>

                <div class="input-group">
                    <label class="block text-sm font-bold text-gray-600 mb-2 ml-1">Mật khẩu</label>
                    <div class="relative group">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400 group-focus-within:text-blue-600">
                            <i class="fa-solid fa-lock text-base"></i>
                        </span>
                        <input type="password" name="password" required
                               class="w-full pl-8 pr-4 py-2 border border-gray-300 rounded-xl transition-all duration-200 bg-gray-50 focus:bg-white text-base"
                               placeholder="••••••••">
                    </div>
                </div>

                <button type="submit" 
                        class="w-full bg-evn-orange text-white font-bold py-3 px-4 rounded-xl shadow-2xl transform transition-all duration-300 hover:scale-[1.02] active:scale-[0.98] focus:outline-none flex items-center justify-center group text-base shadow-orange-500/20">
                    <span>ĐĂNG NHẬP NGAY</span>
                    <i class="fa-solid fa-arrow-right-long ml-2 group-hover:translate-x-1 transition-transform"></i>
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-gray-100 text-center">
                <p class="text-xs text-gray-400 uppercase tracking-widest font-black whitespace-nowrap copyright">
                    &copy; 2026 EVNGENCO1 - CÔNG TY THUỶ ĐIỆN BẢN VẼ
                </p>
            </div>
        </div>
        
        <p class="text-center text-white text-xs mt-6 opacity-60 font-bold uppercase tracking-widest whitespace-nowrap support-text">
            Hỗ trợ kỹ thuật: <span class="text-white">quangvinhatd2@gmail.com</span> | Version 1.0.0
        </p>
    </div>

</body>
</html>
